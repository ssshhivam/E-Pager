spring:
  config:
    import: optional:file:./application-local.yml
  application:
    name: epager
  datasource:
    url: ${EPAGER_DB_URL:jdbc:postgresql://localhost:5432/epager}
    username: ${EPAGER_DB_USERNAME:epager}
    password: ${EPAGER_DB_PASSWORD:epager}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: 8080

epager:
  scheduler:
    escalation-check-rate-ms: 60000
  security:
    jwt-secret: ${EPAGER_JWT_SECRET:change-this-local-dev-secret}
    jwt-ttl-seconds: ${EPAGER_JWT_TTL_SECONDS:28800}
    refresh-token-ttl-seconds: ${EPAGER_REFRESH_TOKEN_TTL_SECONDS:604800}
  gateway:
    dynatrace-token: ${EPAGER_GATEWAY_DYNATRACE_TOKEN:change-this-dynatrace-gateway-token}
    epager-alert-url: ${EPAGER_GATEWAY_EPAGER_ALERT_URL:http://localhost:8080/api/alerts/dynatrace}
    epager-hmac-secret: ${EPAGER_GATEWAY_EPAGER_HMAC_SECRET:demo-webhook-token}
  firebase:
    enabled: ${EPAGER_FIREBASE_ENABLED:false}
    service-account-path: ${EPAGER_FIREBASE_SERVICE_ACCOUNT_PATH:}
    project-id: ${EPAGER_FIREBASE_PROJECT_ID:}

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:epager;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
