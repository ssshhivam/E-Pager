spring:
  config:
    import: optional:file:./application-local.yml
  application:
    name: epager
  datasource:
    url: ${EPAGER_DB_URL:jdbc:postgresql://localhost:5432/epager}
    username: ${EPAGER_DB_USERNAME:epager}
    password: ${EPAGER_DB_PASSWORD:epager}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

epager:
  scheduler:
    escalation-check-rate-ms: 60000

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:epager;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
