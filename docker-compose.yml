services:
  postgres:
    image: postgres:16
    container_name: epager-postgres
    environment:
      POSTGRES_DB: epager
      POSTGRES_USER: epager
      POSTGRES_PASSWORD: epager
    ports:
      - "5432:5432"
    volumes:
      - epager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epager -d epager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  epager_postgres_data:
